<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日のスギ花粉情報</title>

  <style>
    body {
      font-family: "Meiryo", sans-serif;
      margin: 20px;
      padding: 0;
      background-color: #f7fff7;
    }
    h1 {
      color: #2a7f62;
      text-align: center;
    }
    #pollen-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 20px auto;
      text-align: center;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <h1>今日の憎きスギ花粉情報</h1>

  <div id="pollen-box">
    読み込み中…
  </div>

<script>
async function loadPollen() {
  const box = document.getElementById("pollen-box");

  try {
    // ★ はなこさん：横浜市金沢区 富岡観測所
    const url = "https://www.env.go.jp/air/osen/hanako/data/xml/14108010.xml";

    const response = await fetch(url);
    if (!response.ok) {
      box.textContent = "花粉データを取得できませんでした";
      return;
    }

    const xmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "application/xml");

    const dailyList = xml.querySelectorAll("daily");
    const latest = dailyList[dailyList.length - 1];

    const time = latest.querySelector("time").textContent;
    const pollen = latest.querySelector("pollen").textContent;

    box.textContent = `最新のスギ花粉：${pollen} 個/m³（${time} 時点）`;

  } catch (e) {
    box.textContent = "エラー：" + e.message;
  }
}

loadPollen();
</script>

</body>

</html>
