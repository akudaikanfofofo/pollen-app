<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日のスギ花粉情報</title>

  <style>
    body {
      font-family: "Meiryo", sans-serif;
      margin: 20px;
      padding: 0;
      background-color: #f7fff7;
    }
    h1 {
      color: #2a7f62;
      text-align: center;
    }
    #pollen-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 20px auto;
      text-align: center;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <h1>今日の憎きスギ花粉情報</h1>

  <div id="pollen-box">
    読み込み中…
  </div>

<script>
async function loadPollen() {
  const box = document.getElementById("pollen-box");

  try {
    // ★ GitHub Pages の同じフォルダにある CSV を読み込む
    const url = "pollen_14108_20250301_20250331.csv";
    const response = await fetch(url);

    if (!response.ok) {
      box.textContent = "CSV を読み込めませんでした";
      return;
    }

    const text = await response.text();
    const lines = text.trim().split("\n");

    // 1行目はヘッダー
    const dataLines = lines.slice(1);

    let total = 0;

    for (const line of dataLines) {
      const [citycode, dateStr, pollenStr] = line.split(",");

      // 2025-03-01 のデータだけ合計する
      if (dateStr.startsWith("2025-03-01")) {
        total += Number(pollenStr);
      }
    }

    box.textContent = `2025年3月1日の花粉量の合計：${total} 個/m³`;

  } catch (e) {
    box.textContent = "エラー：" + e.message;
  }
}

loadPollen();
</script>

</body>

</html>
