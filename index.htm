<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日のスギ花粉情報</title>

  <style>
    body {
      font-family: "Meiryo", sans-serif;
      margin: 20px;
      padding: 0;
      background-color: #f7fff7;
    }
    h1 {
      color: #2a7f62;
      text-align: center;
    }
    #pollen-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 20px auto;
      text-align: center;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <h1>今日の憎きスギ花粉情報</h1>

  <div id="pollen-box">
    読み込み中…
  </div>

<script>
async function loadPollen() {
  const box = document.getElementById("pollen-box");

  try {
    // ★ 試験用：東京都千代田区の観測地点ID
    const url = `curl 'https://wxtech.weathernews.com/opendata/v1/pollen?citycode=13101&start=20260301&end=20260305'`;

    const response = await fetch(url);
    if (!response.ok) {
      box.textContent = "花粉データを取得できませんでした";
      return;
    }

    const data = await response.json();

    // API の返す JSON 例：
    // { "pollen": 23, "time": "2026-03-05T12:00:00+09:00", ... }

    const pollen = data.pollen;
    const time = data.time;

    box.textContent = `最新のスギ花粉：${pollen} 個/m³（${time} 時点）`;

  } catch (e) {
    box.textContent = "エラー：" + e.message;
  }
}

loadPollen();
</script>


</body>

</html>
